  /resources/search:
    get:
      tags:
        - ResourceSearch
      summary: リソース横断検索（building / floor / space / device / point を名前・IDで検索）。
      parameters:
        - name: q
          in: query
          description: 検索語（名前・ID の部分一致、大文字小文字を無視）
          schema:
            type: string
        - name: type
          in: query
          description: リソース種別で絞り込み（building/floor/space/device/point）。省略時は全種別
          schema:
            type: string
        - name: buildingId
          in: query
          description: 建物 dtId でスコープ（building/floor/space のみ対象）
          schema:
            type: string
        - name: tag
          in: query
          description: 'SBCO customTags のキーで絞り込み（customTags[key] == true）。複数指定は AND（#332）'
          schema:
            type: array
            items:
              type: string
        - name: limit
          in: query
          description: 最大件数（1..200、既定 50）
          schema:
            type: integer
            format: int32
            default: 50
        - name: offset
          in: query
          description: オフセット（既定 0）
          schema:
            type: integer
            format: int32
            default: 0
      responses:
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ResourceSearchHit'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
