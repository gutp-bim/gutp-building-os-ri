  '/gateways/{gatewayId}/pointlist':
    get:
      tags:
        - GatewayProvisioning
      summary: "当該 gateway が所有する全 point（native addressing / unit / writable / control schema / device）を\r\n返す。`If-None-Match` が現在の ETag と一致すれば 304。`?since={etag}` 指定時は差分\r\n（added/removed/changed）を返す（スナップショット未保持なら full にフォールバック）。"
      description: "The 200 response is BuildingOs.ApiServer.GatewayProvisioning.GatewayPointListResponse for the full list (no `since`, or\r\nsnapshot evicted) and BuildingOs.ApiServer.GatewayProvisioning.GatewayPointListDiffResponse for a resolvable `?since=`\r\ndiff. Swagger documents only the full-list shape (Swashbuckle doesn't merge two response types\r\nunder one status code without a custom schema filter) — treat it as the primary contract."
      parameters:
        - name: gatewayId
          in: path
          required: true
          schema:
            type: string
        - name: since
          in: query
          schema:
            type: string
      responses:
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GatewayPointListResponse'
        '304':
          description: Not Modified
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
  /api/admin/gateways:
    get:
      tags:
        - Gateways
      summary: ゲートウェイ一覧（binding + マスク済み設定 + pointlist 件数/revision）。管理者のみ。
