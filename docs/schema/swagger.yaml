        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
  /spaces:
    get:
      tags:
        - Space
      summary: スペース情報の一括取得
      parameters:
        - name: floorDtId
          in: query
          description: スペースを含めフロアのdtId
          schema:
            type: string
      responses:
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
