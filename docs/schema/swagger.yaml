          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
  '/spaces/{spaceDtId}':
    get:
      tags:
        - Space
      summary: スペース情報の取得
      parameters:
        - name: spaceDtId
          in: path
          description: スペースのdtId
          required: true
          schema:
