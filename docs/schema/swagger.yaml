      summary: ポイント情報の取得
      parameters:
        - name: pointId
          in: path
          description: ポイントId（ビジネスID）
          required: true
          schema:
            type: string
      responses:
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '403':
