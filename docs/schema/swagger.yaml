          minLength: 1
          type: string
        id:
          minLength: 1
          type: string
        name:
          minLength: 1
          type: string
        specification:
          type: string
          nullable: true
        type:
          type: string
          nullable: true
        writable:
          type: boolean
          nullable: true
        gatewayName:
          type: string
          nullable: true
        minPresValue:
          type: integer
          format: int32
          nullable: true
        maxPresValue:
          type: integer
          format: int32
          nullable: true
        targetArea:
          type: string
          nullable: true
        panel:
          type: string
          nullable: true
        labels:
          type: string
          nullable: true
        scale:
          type: number
          format: float
          nullable: true
        installationArea:
          type: string
          nullable: true
        unit:
          type: string
          nullable: true
        interval:
          type: number
          format: float
          nullable: true
        instanceNoBacnet:
          type: integer
          format: int32
          nullable: true
        objectTypeBacnet:
          type: string
          nullable: true
        deviceIdBacnet:
          type: string
          nullable: true
        rowDataString:
          type: string
          nullable: true
      additionalProperties: false
    PointControlRequest:
