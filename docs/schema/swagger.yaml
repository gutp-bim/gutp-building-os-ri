  '/points/{pointId}/control':
    post:
      tags:
        - Point
      summary: 機器制御用の API
      parameters:
        - name: pointId
          in: path
          description: 制御対象のポイントID
          required: true
          schema:
            type: string
      requestBody:
        description: 制御に関する情報
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PointControlRequest'
          text/json:
            schema:
              $ref: '#/components/schemas/PointControlRequest'
          application/*+json:
            schema:
              $ref: '#/components/schemas/PointControlRequest'
      responses:
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '200':
          description: OK
        '202':
          description: Accepted
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
  /point-details:
    get:
      tags:
        - PointDetail
      summary: ポイント詳細の一括取得
      parameters:
        - name: buildingDtId
          in: query
          description: ビルのdtId
          schema:
            type: string
      responses:
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '403':
          description: Forbidden
          content:
            application/json:
