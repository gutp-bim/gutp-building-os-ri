components:
  schemas:
    AddPermissionRequest:
      type: object
      properties:
        permission:
          type: string
      additionalProperties: false
    AddResourceRequest:
      type: object
      properties:
        resourceType:
          type: string
        resourceId:
          type: string
      additionalProperties: false
    GatewayPointListResponse:
      type: object
      properties:
        gatewayId: { type: string }
        revision: { type: string }
        generatedAt: { type: string, format: date-time }
        points:
          type: array
          items: { $ref: '#/components/schemas/GatewayPointDto' }
      additionalProperties: false
    GatewayPointListDiffResponse:
      type: object
      properties:
        gatewayId: { type: string }
        revision: { type: string }
        since: { type: string }
        full: { type: boolean }
        added:
          type: array
          items: { $ref: '#/components/schemas/GatewayPointDto' }
        removed:
          type: array
          items: { type: string }
        changed:
          type: array
          items: { $ref: '#/components/schemas/GatewayPointDto' }
        points:
          type: array
          items: { $ref: '#/components/schemas/GatewayPointDto' }
      additionalProperties: false
    GatewayPointDto:
      type: object
      properties:
        pointId: { type: string }
        localId: { type: string, nullable: true }
        native:
          nullable: true
          allOf:
            - $ref: '#/components/schemas/NativeAddressingDto'
        unit: { type: string, nullable: true }
        writable: { type: boolean, nullable: true }
        controlSchema:
          nullable: true
          allOf:
            - $ref: '#/components/schemas/ControlSchemaDto'
        device:
          nullable: true
          allOf:
            - $ref: '#/components/schemas/DeviceRefDto'
      additionalProperties: false
    NativeAddressingDto:
      type: object
      properties:
        protocol: { type: string }
        deviceId: { type: string, nullable: true }
        objectType: { type: string, nullable: true }
        instanceNo: { type: string, nullable: true }
      additionalProperties: false
    ControlSchemaDto:
      type: object
      properties:
        dataType: { type: string, nullable: true }
        minValue: { type: string, nullable: true }
        maxValue: { type: string, nullable: true }
        enumLabels: { type: string, nullable: true }
      additionalProperties: false
    DeviceRefDto:
      type: object
      properties:
        dtId: { type: string, nullable: true }
        id: { type: string, nullable: true }
        name: { type: string, nullable: true }
      additionalProperties: false
    Building:
      required:
        - dtId
        - id
        - name
      type: object
      properties:
        dtId:
          minLength: 1
          type: string
        id:
          minLength: 1
          type: string
        name:
          minLength: 1
          type: string
      additionalProperties: false
    ResourceSearchHit:
      type: object
      properties:
        type:
          type: string
        dtId:
          type: string
        id:
          type: string
        name:
          type: string
        buildingDtId:
          type: string
          nullable: true
      additionalProperties: false
    BulkAddResourceRequest:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/AddResourceRequest'
      additionalProperties: false
    BulkAddResourceResponse:
      type: object
      properties:
        added:
          type: array
          items:
            $ref: '#/components/schemas/ResourceItemResponse'
        failed:
          type: array
          items:
            type: string
      additionalProperties: false
    ControlSchema:
      type: object
      properties:
        dataType:
          type: string
        enumLabels:
          type: string
          nullable: true
      additionalProperties: false
    CreateGroupRequest:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
          nullable: true
      additionalProperties: false
    Device:
      required:
        - dtId
        - id
        - name
      type: object
      properties:
        dtId:
          minLength: 1
          type: string
        id:
          minLength: 1
          type: string
        name:
          minLength: 1
          type: string
        buildingName:
          type: string
          nullable: true
        floorNumber:
          type: integer
          format: int32
          nullable: true
        owner:
          type: string
          nullable: true
        site:
          type: string
          nullable: true
        supplier:
          type: string
          nullable: true
        gatewayId:
          type: string
          nullable: true
        deviceType:
          type: string
          nullable: true
      additionalProperties: false
    DeviceDetail:
      required:
        - device
      type: object
      properties:
        device:
          $ref: '#/components/schemas/Device'
        floor:
          $ref: '#/components/schemas/Floor'
