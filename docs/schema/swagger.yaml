  '/api/admin/gateways/{id}/resync-pointlist':
    post:
      tags:
        - Gateways
      summary: "pointlist の再同期 push 通知を送る（`building-os.pointlist.updated.gw.{id}`）。ゲートウェイは\r\nETag で再検証する（push は最適化、ETag ポーリングが信頼性のバックストップ）。監査必須。管理者のみ。"
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '202':
          description: Accepted
        '404':
          description: Not Found
