openapi: 3.0.1
info:
  title: Building OS API
  description: An ASP.NET Core API for Building OS
  version: v1
paths:
  /api/Auth/me:
    get:
      tags:
        - Auth
      summary: 現在のユーザーの認可コンテキストを取得
      responses:
        '200':
          description: OK
  /api/Auth/check:
    get:
      tags:
        - Auth
      summary: 指定リソースへのアクセス可否を確認
      parameters:
        - name: resourceType
          in: query
          schema:
            type: string
        - name: resourceId
          in: query
          schema:
            type: string
        - name: action
          in: query
          schema:
            type: string
      responses:
        '200':
          description: OK
  /gateways/{gatewayId}/pointlist:
    get:
      tags:
        - GatewayProvisioning
      summary: ゲートウェイ所有 Point List のエクスポート（native addressing 含む、ETag/304）
      parameters:
        - name: gatewayId
          in: path
          required: true
          schema:
            type: string
        - name: since
          in: query
          required: false
          description: 指定時は当該 ETag からの差分（added/removed/changed）を返す。未保持なら full。
          schema:
            type: string
        - name: If-None-Match
          in: header
          required: false
          schema:
            type: string
      responses:
        '200':
          description: OK（since 指定時は GatewayPointListDiffResponse）
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GatewayPointListResponse'
        '304':
          description: Not Modified
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '403':
          description: Forbidden
  /buildings:
    get:
      tags:
        - Building
      summary: ビル情報の一括取得
      responses:
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Building'
  '/buildings/{buildingDtId}':
    get:
      tags:
        - Building
      summary: "ビル情報を取得\r\n指定されたdtIdに対応するビルの詳細情報を返します。"
      parameters:
        - name: buildingDtId
          in: path
          description: ビルのdtId
          required: true
          schema:
            type: string
      responses:
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Building'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
  '/devices/{deviceDtId}':
    get:
      tags:
        - Device
      summary: デバイス情報の取得
      parameters:
        - name: deviceDtId
          in: path
          description: デバイスのdtId
          required: true
          schema:
            type: string
      responses:
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Device'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
  /devices:
    get:
      tags:
        - Device
      summary: デバイスの一括取得
      parameters:
        - name: spaceDtId
          in: query
          description: デバイスが配置されているスペースのdtId
          schema:
            type: string
      responses:
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Device'
  /device-details:
    get:
      tags:
        - DeviceDetail
      summary: ビル内のデバイス詳細情報の一括取得
      parameters:
        - name: buildingDtId
          in: query
          description: ビルのdtId
          schema:
            type: string
      responses:
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/DeviceDetail'
  '/floors/{floorDtId}':
    get:
      tags:
        - Floor
      summary: フロア情報の取得
      parameters:
        - name: floorDtId
          in: path
          description: フロアのdtId
          required: true
          schema:
            type: string
      responses:
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Floor'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
  /floors:
    get:
      tags:
        - Floor
      summary: フロア情報の一括取得
      parameters:
        - name: buildingDtId
          in: query
          description: フロアを含むビルのdtId
          schema:
            type: string
      responses:
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Floor'
  /api/Groups:
    get:
      tags:
        - Groups
      summary: グループ一覧を取得
      responses:
        '403':
          description: Forbidden
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
            text/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '200':
          description: OK
          content:
            text/plain:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/GroupResponse'
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/GroupResponse'
            text/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/GroupResponse'
    post:
      tags:
        - Groups
      summary: グループを作成
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateGroupRequest'
          text/json:
            schema:
              $ref: '#/components/schemas/CreateGroupRequest'
          application/*+json:
            schema:
              $ref: '#/components/schemas/CreateGroupRequest'
      responses:
        '403':
          description: Forbidden
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
            text/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '201':
          description: Created
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/GroupResponse'
            application/json:
              schema:
                $ref: '#/components/schemas/GroupResponse'
            text/json:
              schema:
                $ref: '#/components/schemas/GroupResponse'
        '400':
          description: Bad Request
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
            text/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
  '/api/Groups/{id}':
    get:
      tags:
