openapi: 3.0.1
info:
  title: Building OS API
  description: An ASP.NET Core API for Building OS
  version: v1
paths:
  /api/admin/audit:
    get:
      tags:
        - AdminAudit
      summary: 監査ログを新しい順に取得する。subjectType / targetId で絞り込み可能。管理者のみ。
      parameters:
        - name: subjectType
          in: query
          schema:
            type: string
        - name: targetId
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            format: int32
            default: 100
      responses:
        '200':
          description: OK
          content:
            text/plain:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AdminAuditResponse'
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AdminAuditResponse'
            text/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AdminAuditResponse'
        '403':
          description: Forbidden
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
            text/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
  /api/assistant/chat:
    post:
      tags:
        - Assistant
      summary: 1ターンのチャット。無効時は 503、上流 LLM エラー時は 502。
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AssistantChatRequest'
          text/json:
            schema:
              $ref: '#/components/schemas/AssistantChatRequest'
          application/*+json:
            schema:
              $ref: '#/components/schemas/AssistantChatRequest'
      responses:
        '200':
          description: OK
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/AssistantControllerAssistantChatResponse'
            application/json:
              schema:
                $ref: '#/components/schemas/AssistantControllerAssistantChatResponse'
            text/json:
              schema:
                $ref: '#/components/schemas/AssistantControllerAssistantChatResponse'
        '503':
          description: Service Unavailable
        '502':
          description: Bad Gateway
  /api/Auth/me:
    get:
      tags:
        - Auth
      summary: 現在のユーザーの認可コンテキストを取得
      responses:
        '200':
          description: OK
  /api/Auth/check:
    get:
      tags:
        - Auth
      summary: 指定リソースへのアクセス可否を確認
      parameters:
        - name: resourceType
          in: query
          schema:
            type: string
        - name: resourceId
          in: query
          schema:
            type: string
        - name: action
          in: query
          schema:
            type: string
      responses:
        '200':
          description: OK
  /buildings:
    get:
      tags:
        - Building
      summary: ビル情報の一括取得
      responses:
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
