        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Building'
  '/buildings/{buildingDtId}':
    get:
      tags:
        - Building
      summary: ビル情報を取得
      parameters:
