            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
            text/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
  '/api/Groups/{id}/resources/bulk':
    post:
      tags:
        - Groups
      summary: グループにリソースを一括追加
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BulkAddResourceRequest'
          text/json:
            schema:
              $ref: '#/components/schemas/BulkAddResourceRequest'
          application/*+json:
            schema:
              $ref: '#/components/schemas/BulkAddResourceRequest'
      responses:
        '403':
          description: Forbidden
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
            text/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '200':
          description: OK
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/BulkAddResourceResponse'
            application/json:
              schema:
                $ref: '#/components/schemas/BulkAddResourceResponse'
            text/json:
              schema:
                $ref: '#/components/schemas/BulkAddResourceResponse'
        '404':
          description: Not Found
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
            text/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
  /api/MyResources/accessible:
    get:
      tags:
        - MyResources
      summary: 指定リソースタイプのアクセス可能リソースID一覧を取得
      parameters:
        - name: resourceType
          in: query
          schema:
            type: string
        - name: action
          in: query
          schema:
            type: string
      responses:
        '200':
          description: OK
  /api/MyResources:
    get:
      tags:
        - MyResources
      summary: ユーザーのアクセス可能リソース一覧を取得（全リソースタイプ）
      responses:
        '200':
          description: OK
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/MyResourcesResponse'
            application/json:
              schema:
                $ref: '#/components/schemas/MyResourcesResponse'
            text/json:
              schema:
                $ref: '#/components/schemas/MyResourcesResponse'
  /points:
    get:
      tags:
        - Point
      summary: ポイント情報の一括取得
      parameters:
        - name: deviceDtId
          in: query
          description: ポイントを保持しているデバイスのdtId
          schema:
            type: string
      responses:
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
