# Building OS — Dev プロファイル (ローカルデバイスシミュレーター)
#
# このファイルは仮想エッジデバイス (mqtt_edge_device.py) のみを起動する。
# Mosquitto は docker-compose.oss.yaml に含まれるが --profile mqtt 限定で、
# make local-up-oss(プロファイルなし)には含まれない(#25)。`make local-up-dev`
# が OSS スタックを `--profile mqtt` + `MQTT_HOST` 付きで(再)起動してから
# このファイルを up するため、Mosquitto はそちらの手順で用意される —
# このファイル単体を直接 `docker compose -f docker-compose.dev.yaml up -d`
# するだけでは Mosquitto は起動しないので注意。
#
# 使い方:
#   make local-up-oss        # OSS フルスタック起動(Mosquitto は含まれない)
#   make local-up-dev        # OSS スタックを --profile mqtt で再起動 + デバイスシミュレーター起動

networks:
  oss:
    external: true
    name: building-os-oss

services:

  # ── MQTT デバイスシミュレーター ───────────────────────────────────────────
  # Mosquitto (building-os.mosquitto) に MQTT テレメトリを送信するシミュレーター。
  # OSS スタックの MqttIngressWorker が受信し NATS へ転送する。
  building-os.dev-device:
    build:
      context: ./Tools/development-edge-device
      dockerfile: Dockerfile.simple
    container_name: building-os.dev-device
    environment:
      MQTT_HOST: building-os.mosquitto
      MQTT_PORT: "1883"
      MQTT_USERNAME: devices
      MQTT_PASSWORD: ${MQTT_DEVICES_PASSWORD:-buildingos-devices}
      MQTT_TOPIC: telemetry/dev-simulator
      PUBLISH_INTERVAL: "5"
    networks:
      - oss
    restart: unless-stopped
