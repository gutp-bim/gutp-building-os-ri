# Argo CD Helm values overlay — example environment ("utokyo-eng2").
# This is a REFERENCE CONFIGURATION for an on-premises Kubernetes deployment,
# kept in this repo only as a working sample (#17): production environment
# values are recommended to live in a dedicated GitOps repository. Start your
# own environment from argocd/values/example.yaml and point the
# argocd-image-update workflow at it via the ARGOCD_VALUES_FILE repository
# variable. Domain names (*.eng2.buildingos.local) and image tags are
# site-specific; the tag is rewritten by CI on every main merge.
# Referenced by argocd/apps/utokyo-eng2.yaml.

replicaCount: 1

image:
  repository: harbor.eng2.buildingos.local/building-os/building-os-api-server
  tag: 05af6e02
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 80
  targetPort: 8080

secretName: api-server-env

keycloak:
  realm: building-os
  clientId: api-server
  issuerUri: https://keycloak.eng2.buildingos.local/realms/building-os

oxigraph:
  endpoint: http://oxigraph.building-os.svc.cluster.local:7878

nats:
  url: nats://nats.building-os.svc.cluster.local:4222

ingress:
  enabled: true
  host: api.eng2.buildingos.local

autoscaling:
  enabled: false
