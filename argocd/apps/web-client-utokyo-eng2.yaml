apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: web-client-utokyo-eng2
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    notifications.argoproj.io/subscribe.on-sync-failed.slack: "building-os-alerts"
spec:
  project: default

  source:
    repoURL: https://github.com/takashikasuya/gutp-building-os-oss.git
    targetRevision: HEAD
    path: kubernetes/helm/web-client
    helm:
      valueFiles:
        - ../../argocd/values/web-client-utokyo-eng2.yaml
      values: |
        image:
          repository: harbor.eng2.buildingos.local/building-os/building-os-web-client

  destination:
    server: https://kubernetes.default.svc
    namespace: building-os

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
      - PruneLast=true
    retry:
      limit: 3
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 3m

  revisionHistoryLimit: 5
