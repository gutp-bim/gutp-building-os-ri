{{- if .Values.webClient.enabled }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-client
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "building-os.labels" . | nindent 4 }}
    app.kubernetes.io/component: web-client
spec:
  replicas: {{ .Values.webClient.replicas }}
  selector:
    matchLabels:
      app: web-client
  template:
    metadata:
      labels:
        app: web-client
    spec:
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: web-client
          image: "{{ include "building-os.image" (dict "global" .Values.global "image" .Values.webClient.image) }}"
          imagePullPolicy: {{ .Values.webClient.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          env:
            {{- range $key, $value := .Values.webClient.env }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            {{- toYaml .Values.webClient.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: web-client
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "building-os.labels" . | nindent 4 }}
spec:
  type: {{ .Values.webClient.service.type }}
  ports:
    - port: {{ .Values.webClient.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app: web-client
{{- end }}
