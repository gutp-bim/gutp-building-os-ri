{{- if .Values.apiServer.enabled }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-server
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "building-os.labels" . | nindent 4 }}
    app.kubernetes.io/component: api-server
spec:
  replicas: {{ .Values.apiServer.replicas }}
  selector:
    matchLabels:
      app: api-server
  template:
    metadata:
      labels:
        app: api-server
        {{- include "building-os.labels" . | nindent 8 }}
    spec:
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: api-server
          image: "{{ include "building-os.image" (dict "global" .Values.global "image" .Values.apiServer.image) }}"
          imagePullPolicy: {{ .Values.apiServer.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            {{- range $key, $value := .Values.apiServer.env }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
            {{- range $key, $value := .Values.apiServer.secretEnv }}
            - name: {{ $key }}
              valueFrom:
                secretKeyRef:
                  name: building-os-api-secrets
                  key: {{ $key | lower | replace "_" "-" }}
            {{- end }}
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
          resources:
            {{- toYaml .Values.apiServer.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: api-server
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "building-os.labels" . | nindent 4 }}
spec:
  type: {{ .Values.apiServer.service.type }}
  ports:
    - port: {{ .Values.apiServer.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app: api-server
{{- end }}
