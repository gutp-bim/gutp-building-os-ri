replicaCount: 1

image:
  repository: ghcr.io/gutp/building-os-api-server
  tag: latest
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 80
  targetPort: 8080

resources:
  requests:
    memory: "256Mi"
    cpu: "100m"
  limits:
    memory: "512Mi"
    cpu: "500m"

env:
  ASPNETCORE_ENVIRONMENT: Production
  PORT: "8080"

# Injected by OpenTofu or CI as a K8s Secret reference
secretName: api-server-env

keycloak:
  realm: building-os
  clientId: ""
  issuerUri: ""

timescaledb:
  host: timescaledb.building-os.svc.cluster.local
  port: 5432
  database: building_os

oxigraph:
  endpoint: http://oxigraph.building-os.svc.cluster.local:7878

nats:
  url: nats://nats.building-os.svc.cluster.local:4222

ingress:
  enabled: false
  host: api.buildingos.local

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 3

# Warm-tier storage mode (#216): "parquet" (default) or "timescale".
warmStore: parquet
