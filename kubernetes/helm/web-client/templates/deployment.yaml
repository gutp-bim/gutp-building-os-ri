apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-web-client
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: web-client
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/part-of: building-os
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: web-client
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: web-client
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      containers:
        - name: web-client
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.targetPort }}
          env:
            - name: NEXT_PUBLIC_API_BASE_URL
              value: {{ .Values.env.NEXT_PUBLIC_API_BASE_URL | quote }}
            - name: NEXT_PUBLIC_KEYCLOAK_CLIENT_ID
              value: {{ .Values.env.NEXT_PUBLIC_KEYCLOAK_CLIENT_ID | quote }}
            - name: NEXT_PUBLIC_KEYCLOAK_AUTHORITY
              value: {{ .Values.env.NEXT_PUBLIC_KEYCLOAK_AUTHORITY | quote }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
