replicaCount: 1

image:
  repository: ghcr.io/gutp/building-os-web-client
  tag: latest
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 80
  targetPort: 3000

resources:
  requests:
    memory: "128Mi"
    cpu: "50m"
  limits:
    memory: "256Mi"
    cpu: "200m"

env:
  NEXT_PUBLIC_API_BASE_URL: "http://api-server.building-os.svc.cluster.local"
  NEXT_PUBLIC_KEYCLOAK_CLIENT_ID: ""
  NEXT_PUBLIC_KEYCLOAK_AUTHORITY: ""

ingress:
  enabled: false
  host: buildingos.local
