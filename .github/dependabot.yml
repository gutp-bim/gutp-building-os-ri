version: 2
updates:
  - package-ecosystem: nuget
    directory: "/DotNet"
    schedule:
      interval: weekly
      day: monday
    groups:
      dotnet-patch:
        update-types: ["patch"]
      dotnet-minor:
        update-types: ["minor"]
    ignore:
      # Corvus.Json.ExtendedTypes 5.x (and its matching dotnet-tools.json CLI companion,
      # corvus.json.jsonschema.typegeneratortool) require System.Text.Json >= 10.0.7, which
      # conflicts (NU1605 downgrade error) with the rest of the net8.0 solution pinned to
      # System.Text.Json >= 9.0.3. Re-evaluate once the solution moves to a TFM whose default
      # System.Text.Json is >= 10.
      - dependency-name: "Corvus.Json.ExtendedTypes"
        update-types: ["version-update:semver-major"]
      - dependency-name: "corvus.json.jsonschema.typegeneratortool"
        update-types: ["version-update:semver-major"]
      # Microsoft.Extensions.* packages within a generation (8.x/9.x/10.x) require matching
      # versions of their siblings (e.g. Microsoft.Extensions.Hosting 10.0.9 requires
      # Microsoft.Extensions.Logging.Abstractions >= 10.0.9). Dependabot proposes these one
      # package at a time, so a lone major bump always NU1605-conflicts against the rest of the
      # solution still pinned to 9.x. Verified with #73/#75/#76. A real move to the 10.x
      # generation needs one coordinated PR bumping the whole family together, not Dependabot's
      # one-at-a-time proposals.
      - dependency-name: "Microsoft.Extensions.*"
        update-types: ["version-update:semver-major"]
      # MQTTnet 5.x removed the MQTTnet.Client namespace and reshaped the client API — a genuine
      # source-level break, not a version mismatch. MqttIngressWorker.cs fails to compile
      # (CS0234: 'Client' does not exist in namespace 'MQTTnet') until it's migrated to the v5
      # API. Verified with #98. Needs a deliberate migration, not a routine dependency bump.
      - dependency-name: "MQTTnet"
        update-types: ["version-update:semver-major"]
      # Parquet.Net 6.x reshaped the writer API: ParquetWriter is only async-Disposable now
      # (needs "await using"), CompressionMethod was removed, DataColumn moved namespaces, and
      # ParquetRowGroupWriter.WriteColumnAsync was removed. RollupSerializer.cs alone has 20+
      # compile errors against it — a genuine break across the whole Parquet lake read/write
      # layer (RollupSerializer, ParquetTelemetrySerializer, ParquetLakeWriterWorker, etc.).
      # Verified with #100. Needs a deliberate migration, not a routine dependency bump.
      - dependency-name: "Parquet.Net"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: npm
    directory: "/web-client"
    schedule:
      interval: weekly
      day: monday
    groups:
      npm-patch:
        update-types: ["patch"]
      npm-minor:
        update-types: ["minor"]

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday

  - package-ecosystem: docker
    directory: "/DotNet/BuildingOS.ApiServer"
    schedule:
      interval: weekly
      day: monday
    ignore:
      # Major bumps (8.0 -> 10.0) break at runtime: the app's TFM is net8.0 (fixed to the .csproj,
      # not the base image tag), and .NET's default roll-forward policy does not cross major
      # versions, so an aspnet:10.0(-noble-chiseled) image has no 8.0 runtime to run it with.
      # Verified empirically: the container exits immediately with "You must install or update
      # .NET to run this application ... Framework: Microsoft.NETCore.App, version 8.0.0 ...
      # found: 10.0.9". Re-evaluate together with a coordinated TFM bump across the whole solution.
      - dependency-name: "dotnet/sdk"
        update-types: ["version-update:semver-major"]
      - dependency-name: "dotnet/aspnet"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: docker
    directory: "/DotNet/BuildingOS.ConnectorWorker"
    schedule:
      interval: weekly
      day: monday
    ignore:
      # Same reasoning as the ApiServer entry above — net8.0 TFM, verified the same runtime
      # framework-resolution failure empirically.
      - dependency-name: "dotnet/sdk"
        update-types: ["version-update:semver-major"]
      - dependency-name: "dotnet/aspnet"
        update-types: ["version-update:semver-major"]
