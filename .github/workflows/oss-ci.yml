name: OSS Stack CI

# Manual-trigger only to conserve CI credits — run from the Actions tab when needed.
# (Local verification is the primary gate; see CLAUDE.md.)
on:
  workflow_dispatch:

concurrency:
  group: oss-ci-${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  DOTNET_VERSION: "8.0.x"

jobs:
  # ── .NET unit tests ───────────────────────────────────────────
  dotnet-test:
    name: .NET Unit Tests
    runs-on: ubuntu-latest
    permissions:
      checks: write
      contents: read
    defaults:
      run:
        working-directory: DotNet

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
          cache: true
          cache-dependency-path: DotNet/**/*.csproj

      - name: Restore tools
        run: dotnet tool restore

      - name: Restore
        run: dotnet restore BuildingOS.sln

      - name: Build
        run: dotnet build BuildingOS.sln --no-restore --configuration Release

      # Reports EF model/snapshot drift. Non-blocking: the hand-written
      # initial Npgsql snapshot only affects future `migrations add`, not
      # runtime Database.Migrate(); a drift warning should not gate CI.
      # TODO (B-9): re-generate snapshot and remove continue-on-error.
      - name: Verify EF migration snapshot is up to date
        continue-on-error: true
        run: |
          dotnet ef migrations has-pending-model-changes \
            --project BuildingOS.Shared \
            --context RelationalDbContext

      - name: Unit Tests
        run: |
          dotnet test BuildingOS.sln \
            --no-build --configuration Release \
            --filter "FullyQualifiedName!~IntegrationTest&FullyQualifiedName!~DuckDbSpike" \
            --collect:"XPlat Code Coverage" \
            --logger "trx;LogFileName=unit-test-results.trx" \
            --results-directory TestResults

      - name: Coverage Report
        uses: danielpalme/ReportGenerator-GitHub-Action@5
        if: always()
        with:
          reports: DotNet/TestResults/**/coverage.cobertura.xml
          targetdir: DotNet/TestResults/coverage-report
          reporttypes: MarkdownSummaryGithub

      - name: Upload Coverage Summary
        if: always()
        run: |
          if [ -f TestResults/coverage-report/SummaryGithub.md ]; then
            cat TestResults/coverage-report/SummaryGithub.md >> $GITHUB_STEP_SUMMARY
          fi

      - name: Publish Test Results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: .NET Tests
          path: DotNet/TestResults/**/*.trx
          reporter: dotnet-trx

  # ── Frontend typecheck / lint ─────────────────────────────────
  frontend-check:
    name: Frontend Type Check & Lint
    runs-on: ubuntu-latest
    strategy:
      matrix:
        app:
          - { dir: web-client, node: "22.x", typecheck: "npx tsc --noEmit", lint: "yarn lint" }

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.app.node }}
          cache: yarn
          cache-dependency-path: ${{ matrix.app.dir }}/yarn.lock

      - name: Install dependencies
        working-directory: ${{ matrix.app.dir }}
        run: yarn install --frozen-lockfile

      - name: Type check
        working-directory: ${{ matrix.app.dir }}
        run: ${{ matrix.app.typecheck }}

      - name: Lint
        working-directory: ${{ matrix.app.dir }}
        run: ${{ matrix.app.lint }}

      - name: Unit Tests
        working-directory: ${{ matrix.app.dir }}
        run: yarn test --run

  # ── OSS issue readiness checks ─────────────────────────────────
  oss-readiness:
    name: OSS Issue Readiness
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Validate frontend auth, Keycloak realm, and design docs
        run: bash scripts/validate-oss-issue-readiness.sh

  # ── Helm lint ─────────────────────────────────────────────────
  helm-lint:
    name: Helm Chart Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.16.4

      - name: Lint
        run: helm lint kubernetes/helm/building-os

      - name: Template (dev)
        run: |
          helm template building-os kubernetes/helm/building-os \
            -f kubernetes/helm/building-os/values-dev.yaml

      - name: Template (prod)
        run: |
          helm template building-os kubernetes/helm/building-os \
            -f kubernetes/helm/building-os/values-prod.yaml

