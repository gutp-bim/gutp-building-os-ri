name: OSS Stack CI

# Manual-trigger only to conserve CI credits — run from the Actions tab when needed.
# (Local verification is the primary gate; see CLAUDE.md.)
on:
  workflow_dispatch:

concurrency:
  group: oss-ci-${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  DOTNET_VERSION: "8.0.x"

jobs:
  # ── .NET unit tests ───────────────────────────────────────────
  dotnet-test:
    name: .NET Unit Tests
    runs-on: ubuntu-latest
    permissions:
      checks: write
      contents: read
    defaults:
      run:
        working-directory: DotNet

    steps:
      - uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
          cache: true
          cache-dependency-path: DotNet/**/*.csproj

      - name: Restore tools
        run: dotnet tool restore

      - name: Restore
        run: dotnet restore BuildingOS.sln

      - name: Build
        run: dotnet build BuildingOS.sln --no-restore --configuration Release

      # Reports EF model/snapshot drift so it's caught at PR time instead of
      # surfacing later as a `migrations add` failure (B-9).
      - name: Verify EF migration snapshot is up to date
        run: |
          dotnet ef migrations has-pending-model-changes \
            --project BuildingOS.Shared \
            --context RelationalDbContext

      - name: Unit Tests
        run: |
          dotnet test BuildingOS.sln \
            --no-build --configuration Release \
            --filter "FullyQualifiedName!~IntegrationTest&FullyQualifiedName!~DuckDbSpike" \
            --collect:"XPlat Code Coverage" \
            --logger "trx;LogFileName=unit-test-results.trx" \
            --results-directory TestResults

      - name: Coverage Report
        uses: danielpalme/ReportGenerator-GitHub-Action@5
        if: always()
        with:
          reports: DotNet/TestResults/**/coverage.cobertura.xml
          targetdir: DotNet/TestResults/coverage-report
          reporttypes: MarkdownSummaryGithub

      - name: Upload Coverage Summary
        if: always()
        run: |
          if [ -f TestResults/coverage-report/SummaryGithub.md ]; then
            cat TestResults/coverage-report/SummaryGithub.md >> $GITHUB_STEP_SUMMARY
          fi

      - name: Publish Test Results
        uses: dorny/test-reporter@v3
        if: always()
        with:
          name: .NET Tests
          path: DotNet/TestResults/**/*.trx
          reporter: dotnet-trx

  # ── Frontend typecheck / lint ─────────────────────────────────
  frontend-check:
    name: Frontend Type Check & Lint
    runs-on: ubuntu-latest
    strategy:
      matrix:
        app:
          - { dir: web-client, node: "22.x", typecheck: "npx tsc --noEmit", lint: "yarn lint" }

    steps:
      - uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version: ${{ matrix.app.node }}
          cache: yarn
          cache-dependency-path: ${{ matrix.app.dir }}/yarn.lock

      - name: Install dependencies
        working-directory: ${{ matrix.app.dir }}
        run: yarn install --frozen-lockfile

      - name: Type check
        working-directory: ${{ matrix.app.dir }}
        run: ${{ matrix.app.typecheck }}

      - name: Lint
        working-directory: ${{ matrix.app.dir }}
        run: ${{ matrix.app.lint }}

      - name: Unit Tests
        working-directory: ${{ matrix.app.dir }}
        run: yarn test --run

  # ── UI E2E (Playwright, route-mock — no backend) ───────────────
  # Browser-level E2E for the web client that stubs all API/telemetry calls via
  # page.route(), so it needs neither the OSS stack nor Keycloak (login is injected).
  # The full-stack UI E2E (real login/control/telemetry against `make demo`) is a
  # separate workflow_dispatch job (#159).
  ui-e2e-mock:
    name: UI E2E (route-mock)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version: "22.x"
          cache: yarn
          cache-dependency-path: web-client/yarn.lock

      - name: Install dependencies
        working-directory: web-client
        run: yarn install --frozen-lockfile

      - name: Install Playwright Chromium
        working-directory: web-client
        run: npx playwright install --with-deps chromium

      - name: Run Playwright E2E
        working-directory: web-client
        run: yarn test:e2e

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: web-client/playwright-report/
          retention-days: 7

  # ── UI E2E (Playwright, demo full-stack) ───────────────────────
  # Runs the browser inside the compose network against the real demo stack:
  # Keycloak login, API, live demo telemetry, and simulated control execution.
  ui-e2e-demo:
    name: UI E2E (demo full-stack)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Run demo full-stack E2E
        run: make demo-e2e

      - name: Collect demo logs
        if: failure()
        run: |
          docker compose -f docker-compose.oss.yaml -f docker-compose.demo.yaml -f docker-compose.demo-e2e.yaml \
            --profile demo --profile webclient --profile demo-e2e logs --tail=300 \
            > demo-e2e-compose.log

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-demo-report
          path: |
            web-client/playwright-report/
            web-client/test-results/
            demo-e2e-compose.log
          retention-days: 7

      - name: Stop demo stack
        if: always()
        run: make demo-down

  # ── Swagger / Aspida drift check (B-7) ─────────────────────────
  # Regenerates docs/schema/swagger.yaml from the built API Server and the Aspida client from
  # that swagger doc, then fails if either differs from what's committed. Catches both API changes
  # that were never synced to the frontend types, and swagger-generation regressions (e.g. the
  # schemaId collision that silently broke `dotnet swagger tofile` before this check existed).
  swagger-drift-check:
    name: Swagger / Aspida Drift Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
          cache: true
          cache-dependency-path: DotNet/**/*.csproj

      - name: Restore tools
        working-directory: DotNet
        run: dotnet tool restore

      - name: Generate swagger.yaml
        run: bash Tools/generate_swagger.bash

      - name: Fail if swagger.yaml drifted
        run: |
          if [ -n "$(git status --porcelain docs/schema/swagger.yaml)" ]; then
            echo "docs/schema/swagger.yaml is out of date — run ./Tools/sync-type.bash and commit the diff."
            git diff docs/schema/swagger.yaml
            exit 1
          fi

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version: "22.x"
          cache: yarn
          cache-dependency-path: web-client/yarn.lock

      - name: Install web-client dependencies
        working-directory: web-client
        run: yarn install --frozen-lockfile

      - name: Regenerate Aspida client
        working-directory: web-client
        run: |
          CLIENT_PATH="$(pwd)/src/lib/infra/aspida-client/generated"
          rm -rf "$CLIENT_PATH"/*
          npx openapi2aspida -i="$(pwd)/../docs/schema/swagger.yaml" -o="$CLIENT_PATH"

      - name: Fail if the Aspida client drifted
        run: |
          if [ -n "$(git status --porcelain web-client/src/lib/infra/aspida-client/generated)" ]; then
            echo "web-client/src/lib/infra/aspida-client/generated is out of date — run ./Tools/sync-type.bash and commit the diff."
            git status --porcelain web-client/src/lib/infra/aspida-client/generated
            exit 1
          fi

  # ── OSS issue readiness checks ─────────────────────────────────
  oss-readiness:
    name: OSS Issue Readiness
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - name: Validate frontend auth, Keycloak realm, and design docs
        run: bash scripts/validate-oss-issue-readiness.sh

  # ── Helm lint ─────────────────────────────────────────────────
  helm-lint:
    name: Helm Chart Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - name: Setup Helm
        uses: azure/setup-helm@v5
        with:
          version: v3.16.4

      - name: Lint
        run: helm lint kubernetes/helm/building-os

      - name: Template (dev)
        run: |
          helm template building-os kubernetes/helm/building-os \
            -f kubernetes/helm/building-os/values-dev.yaml

      - name: Template (prod)
        run: |
          helm template building-os kubernetes/helm/building-os \
            -f kubernetes/helm/building-os/values-prod.yaml
