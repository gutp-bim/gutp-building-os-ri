name: Integration Tests

# Manual dispatch (credit conservation) + a weekly schedule (B-6) so regressions are caught
# within a week even when nobody remembers to dispatch it manually.
on:
  workflow_dispatch:
  schedule:
    - cron: '0 3 * * 1'   # every Monday 03:00 UTC

concurrency:
  group: integration-tests-${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  integration-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      issues: write

    steps:
      - uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore DotNet/BuildingOS.IntegrationTest/BuildingOS.IntegrationTest.csproj

      - name: Build
        run: dotnet build DotNet/BuildingOS.IntegrationTest/BuildingOS.IntegrationTest.csproj --no-restore

      - name: Run Integration Tests
        run: |
          dotnet test DotNet/BuildingOS.IntegrationTest/BuildingOS.IntegrationTest.csproj \
            --no-build \
            --filter "Category=Integration" \
            --logger "trx;LogFileName=integration-test-results.trx"

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: integration-test-results
          path: '**/*.trx'

      # B-6: scheduled runs are unattended — file an issue on failure so a red run
      # doesn't silently sit unnoticed for a week. Manual dispatch runs are attended
      # (someone is watching the Actions tab), so they don't need an auto-filed issue.
      - name: File an issue on scheduled failure
        if: failure() && github.event_name == 'schedule'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Integration Tests failed on scheduled run (${new Date().toISOString().slice(0, 10)})`,
              body: `Scheduled Integration Tests run failed: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              labels: ['ci', 'bug'],
            });
