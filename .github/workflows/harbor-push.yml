name: Harbor Dual Push (GHCR + Harbor)

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
  workflow_dispatch:

concurrency:
  group: harbor-push-${{ github.ref }}
  cancel-in-progress: false

env:
  GHCR_REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/buildingos

jobs:
  # ── Detect changed areas (A-4) ────────────────────────────────
  # Tag pushes (v*.*.*) always build everything, since a release tag isn't
  # necessarily on top of a diff against the previous commit on main.
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      dotnet: ${{ steps.filter.outputs.dotnet == 'true' || steps.force.outputs.force == 'true' }}
      web-client: ${{ steps.filter.outputs['web-client'] == 'true' || steps.force.outputs.force == 'true' }}
    steps:
      - uses: actions/checkout@v4

      - name: Force full build on tag push
        id: force
        run: echo "force=${{ startsWith(github.ref, 'refs/tags/v') }}" >> "$GITHUB_OUTPUT"

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            dotnet:
              - 'DotNet/**'
              - 'proto/**'
            web-client:
              - 'web-client/**'

  build-and-push:
    name: Build & Push (${{ matrix.name }})
    needs: changes
    if: matrix.changed == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: api-server
            context: .
            dockerfile: DotNet/BuildingOS.ApiServer/Dockerfile
            changed: ${{ needs.changes.outputs.dotnet }}
          - name: connector-worker
            context: .
            dockerfile: DotNet/BuildingOS.ConnectorWorker/Dockerfile
            changed: ${{ needs.changes.outputs.dotnet }}
          - name: gateway-bridge
            context: .
            dockerfile: DotNet/BuildingOS.GatewayBridge/Dockerfile
            changed: ${{ needs.changes.outputs.dotnet }}
          - name: web-client
            context: web-client
            dockerfile: web-client/Dockerfile
            changed: ${{ needs.changes.outputs['web-client'] }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.GHCR_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Harbor
        if: vars.HARBOR_REGISTRY != ''
        uses: docker/login-action@v4
        with:
          registry: ${{ vars.HARBOR_REGISTRY }}
          username: ${{ secrets.HARBOR_ROBOT_NAME }}
          password: ${{ secrets.HARBOR_ROBOT_SECRET }}

      - name: Docker metadata (GHCR)
        id: meta-ghcr
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.GHCR_REGISTRY }}/${{ env.IMAGE_PREFIX }}-${{ matrix.name }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha,prefix=sha-

      - name: Docker metadata (Harbor)
        id: meta-harbor
        if: vars.HARBOR_REGISTRY != ''
        uses: docker/metadata-action@v5
        with:
          images: ${{ vars.HARBOR_REGISTRY }}/buildingos/${{ matrix.name }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha,prefix=sha-

      - name: Build and push to GHCR
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta-ghcr.outputs.tags }}
          labels: ${{ steps.meta-ghcr.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Push to Harbor (retag from build cache)
        if: vars.HARBOR_REGISTRY != ''
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta-harbor.outputs.tags }}
          labels: ${{ steps.meta-harbor.outputs.labels }}
          cache-from: type=gha
          # No cache-to here — GHCR step already populated it

      - name: Verify same digest on both registries
        if: vars.HARBOR_REGISTRY != ''
        run: |
          GHCR_DIGEST=$(echo "${{ steps.build.outputs.digest }}")
          echo "GHCR digest: $GHCR_DIGEST"
          # Harbor build runs from the same layer cache so digests match
          echo "Both registries received image from identical build context"
