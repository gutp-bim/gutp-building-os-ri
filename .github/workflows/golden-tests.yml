name: Golden Tests

# Manual dispatch (credit conservation) + a weekly schedule (B-6) so regressions are caught
# within a week even when nobody remembers to dispatch it manually.
on:
  workflow_dispatch:
  schedule:
    - cron: '0 3 * * 1'   # every Monday 03:00 UTC

concurrency:
  group: golden-tests-${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  golden-tests:
    name: Connector & ADT Golden Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore DotNet/BuildingOS.Shared.Test

      - name: Build
        run: dotnet build DotNet/BuildingOS.Shared.Test --no-restore

      - name: Run golden tests
        run: dotnet test DotNet/BuildingOS.Shared.Test --no-build --filter "FullyQualifiedName~Golden"

      - name: Fail if snapshots are stale
        run: |
          if [ -n "$(git status --porcelain tests/golden/)" ]; then
            echo "Golden snapshots changed — run UPDATE_GOLDEN=1 dotnet test locally and commit the diff."
            git diff tests/golden/
            exit 1
          fi

      # B-6: scheduled runs are unattended — file an issue on failure so a red run
      # doesn't silently sit unnoticed for a week. Manual dispatch runs are attended
      # (someone is watching the Actions tab), so they don't need an auto-filed issue.
      - name: File an issue on scheduled failure
        if: failure() && github.event_name == 'schedule'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Golden Tests failed on scheduled run (${new Date().toISOString().slice(0, 10)})`,
              body: `Scheduled Golden Tests run failed: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              labels: ['ci', 'bug'],
            });
