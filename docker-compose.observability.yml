services:

  # ─────────────────────────────────────────────────────────────
  # OpenTelemetry Collector: receives OTLP from apps, routes to backends
  # ─────────────────────────────────────────────────────────────
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.104.0
    command: ["--config=/etc/otel/config.yaml"]
    volumes:
      - ./observability/otel-collector/config.yaml:/etc/otel/config.yaml:ro
    ports:
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
      - "8888:8888"   # Collector metrics
    depends_on:
      - tempo
      - prometheus
    networks:
      - observability

  # ─────────────────────────────────────────────────────────────
  # Grafana Tempo: distributed tracing backend
  # ─────────────────────────────────────────────────────────────
  tempo:
    image: grafana/tempo:2.5.0
    command: ["-config.file=/etc/tempo/config.yaml"]
    volumes:
      - ./observability/tempo/config.yaml:/etc/tempo/config.yaml:ro
      - tempo_data:/var/tempo
    ports:
      - "3200:3200"   # HTTP query
    networks:
      - observability

  # ─────────────────────────────────────────────────────────────
  # Prometheus: metrics store
  # ─────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.53.0
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-remote-write-receiver"
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - observability

  # ─────────────────────────────────────────────────────────────
  # Grafana Loki: log aggregation
  # ─────────────────────────────────────────────────────────────
  loki:
    image: grafana/loki:3.1.0
    command: ["-config.file=/etc/loki/config.yaml"]
    volumes:
      - ./observability/loki/config.yaml:/etc/loki/config.yaml:ro
      - loki_data:/loki
    ports:
      - "3100:3100"
    networks:
      - observability

  # ─────────────────────────────────────────────────────────────
  # Grafana: dashboards
  # ─────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:11.1.0
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GF_SECURITY_ADMIN_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_FEATURE_TOGGLES_ENABLE=traceqlEditor
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    ports:
      - "3030:3000"   # 3030 to avoid conflict with Next.js dev server
    depends_on:
      - prometheus
      - tempo
      - loki
    networks:
      - observability

networks:
  observability:
    driver: bridge

volumes:
  tempo_data:
  prometheus_data:
  loki_data:
  grafana_data:
