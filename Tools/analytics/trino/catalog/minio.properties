# Trino Hive catalog pointing to MinIO cold storage Parquet files
connector.name=hive
hive.metastore=file
hive.metastore.catalog.dir=/var/trino/data/minio
hive.s3.path-style-access=true
hive.s3.endpoint=http://minio:9000
hive.s3.aws-access-key=minio
hive.s3.aws-secret-key=minio123
hive.s3.ssl.enabled=false
