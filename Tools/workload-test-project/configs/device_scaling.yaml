scenario_name: "デバイススケーリング負荷試験"
scenario_type: "device_scaling"
description: "段階的にデバイス数を増加させて処理能力を測定"

# デフォルト設定
device_types:
  - "bacnet"
  - "hvac"
  - "environmental"

message_interval_seconds: 60

# 実行ステップ
steps:
  - step_id: 1
    description: "初期ベースライン (100台)"
    device_count: 100
    device_types: ["bacnet", "hvac", "environmental"]
    duration_minutes: 10
    
  - step_id: 2
    description: "中規模負荷 (500台)"
    device_count: 500
    device_types: ["bacnet", "hvac", "environmental", "electric"]
    duration_minutes: 15
    
  - step_id: 3
    description: "大規模負荷 (1000台)"
    device_count: 1000
    device_types: ["bacnet", "hvac", "environmental", "electric", "behavior"]
    duration_minutes: 20
    
  - step_id: 4
    description: "最大負荷 (2000台)"
    device_count: 2000
    device_types: ["bacnet", "hvac", "environmental", "electric", "behavior"]
    duration_minutes: 30