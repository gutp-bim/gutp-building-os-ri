listen: 0.0.0.0:4222
http: 0.0.0.0:8222

jetstream {
  store_dir: /data
  max_memory_store: 256MB
  # 4 streams share this pool (RAW/VALIDATED/CONTROL/DLQ); VALIDATED alone reserves
  # PARQUET_STREAM_MAX_BYTES (default 1GB, docker-compose.oss.yaml) at creation time, so this must
  # stay comfortably above that default or stream creation fails outright with "insufficient
  # storage resources available" (#61).
  max_file_store: 2GB
}
