listen: 0.0.0.0:4222
http: 0.0.0.0:8222

jetstream {
  store_dir: /data
  max_memory_store: 256MB
  # Streams share this pool. In local E2E, an external gateway may create an EVENTS stream with
  # max_bytes=2GiB, and BUILDING_OS_VALIDATED can reserve up to PARQUET_STREAM_MAX_BYTES (default 1GB).
  # Keep headroom above the sum to avoid JetStream "insufficient storage resources available" at startup.
  max_file_store: 4GB
}
