listener 1883
allow_anonymous false
password_file /mosquitto/config/passwd
persistence true
persistence_location /mosquitto/data/
log_dest stdout

# Phase 2: TLS on port 8883 — uncomment and mount certs to /mosquitto/config/certs/
# listener 8883
# cafile /mosquitto/config/certs/ca.crt
# certfile /mosquitto/config/certs/server.crt
# keyfile /mosquitto/config/certs/server.key
# require_certificate false   # Phase 2: password over TLS
# require_certificate true    # Phase 3: mTLS (client certificates)
