[databases]
buildingos = host=building-os.postgres port=5432 dbname=${POSTGRES_DB:-buildingos}

[pgbouncer]
listen_addr = 0.0.0.0
listen_port = 5432
auth_type = md5
auth_file = /etc/pgbouncer/userlist.txt

pool_mode = transaction
max_client_conn = 200
default_pool_size = 50

; transaction pool: reset query is unnecessary — avoid extra roundtrip
server_reset_query =

; connection limits
min_pool_size = 5
reserve_pool_size = 5
reserve_pool_timeout = 3

; timeouts
server_idle_timeout = 600
client_idle_timeout = 0
server_connect_timeout = 15
server_login_retry = 15

; logging
log_connections = 0
log_disconnections = 0
log_pooler_errors = 1

; stats
stats_period = 60
