; Session pool — used exclusively for EF Core migrations (advisory locks require session scope).
; All other application traffic uses pgbouncer.ini (transaction pool on port 6432).

[databases]
buildingos = host=building-os.postgres port=5432 dbname=${POSTGRES_DB:-buildingos}

[pgbouncer]
listen_addr = 0.0.0.0
listen_port = 5432
auth_type = md5
auth_file = /etc/pgbouncer/userlist.txt

pool_mode = session
max_client_conn = 20
default_pool_size = 5

server_idle_timeout = 60
client_idle_timeout = 0

log_connections = 0
log_disconnections = 0
log_pooler_errors = 1
