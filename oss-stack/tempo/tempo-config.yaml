server:
  http_listen_port: 3200

distributor:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317
        http:
          endpoint: 0.0.0.0:4318

storage:
  trace:
    backend: local
    local:
      path: /var/tempo/traces
    wal:
      path: /var/tempo/wal

# Keep local traces for at most seven days. The compose stack pins Tempo 2.10,
# whose compactor schema accepts this setting; do not pair this config with an
# unpinned prerelease image that may change the schema.
compactor:
  compaction:
    block_retention: 168h
