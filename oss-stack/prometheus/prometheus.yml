global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/recording_rules.yml

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: [localhost:9090]

  # otel-collector self-metrics (pipeline/exporter health). Application metrics
  # arrive via remote-write from the collector, not by scraping the apps.
  - job_name: otel-collector
    static_configs:
      - targets: [building-os.otel-collector:8888]

  - job_name: nats
    static_configs:
      - targets: [building-os.nats:8222]
    metrics_path: /metrics

  - job_name: minio
    metrics_path: /minio/v2/metrics/cluster
    static_configs:
      - targets: [building-os.minio:9000]

  - job_name: postgres
    static_configs:
      - targets: [building-os.postgres-exporter:9187]
